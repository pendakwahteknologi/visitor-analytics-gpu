<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO26 — All Detections</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #111827;
            border-bottom: 1px solid #1f2937;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        header h1 { font-size: 1.2rem; font-weight: 600; }
        header span { font-size: 0.8rem; color: #6b7280; }

        .badge {
            background: #7c3aed;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            letter-spacing: 0.05em;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #6b7280;
            flex-shrink: 0;
        }
        .status-dot.live { background: #22c55e; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 0;
            overflow: hidden;
        }

        .video-side {
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #feed {
            max-width: 100%;
            max-height: calc(100vh - 60px);
            object-fit: contain;
            display: none;
        }

        .placeholder {
            text-align: center;
            color: #374151;
        }
        .placeholder svg { width: 64px; height: 64px; margin-bottom: 1rem; }
        .placeholder p { font-size: 0.9rem; }

        .overlay-info {
            position: absolute;
            top: 12px; left: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .info-chip {
            background: rgba(0,0,0,0.7);
            border: 1px solid #1f2937;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .info-chip span { color: #a78bfa; font-weight: 700; }

        .sidebar {
            background: #111827;
            border-left: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #1f2937;
            font-size: 0.8rem;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #detection-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        #detection-list::-webkit-scrollbar { width: 4px; }
        #detection-list::-webkit-scrollbar-track { background: transparent; }
        #detection-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

        .det-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            border-radius: 6px;
            margin-bottom: 2px;
            transition: background 0.15s;
        }
        .det-item:hover { background: #1f2937; }

        .det-name {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: capitalize;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .det-color {
            width: 10px; height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .det-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .det-conf {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .det-count {
            background: #1f2937;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
            padding: 1px 6px;
            color: #a78bfa;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #374151;
            font-size: 0.85rem;
        }

        .conf-bar {
            height: 2px;
            background: #1f2937;
            border-radius: 1px;
            margin-top: 2px;
            overflow: hidden;
        }
        .conf-bar-fill {
            height: 100%;
            border-radius: 1px;
            transition: width 0.3s;
        }

        .footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid #1f2937;
            font-size: 0.72rem;
            color: #4b5563;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <div class="status-dot" id="status-dot"></div>
    <h1>YOLO26 Live Detection Explorer</h1>
    <div class="badge">80 Classes</div>
    <span id="status-text">Connecting...</span>
    <a href="/" style="margin-left:auto; font-size:0.8rem; color:#6b7280; text-decoration:none;">← Back to Dashboard</a>
</header>

<main>
    <div class="video-side">
        <img id="feed" alt="Live feed" />
        <div class="placeholder" id="placeholder">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
            <p>Waiting for camera feed...</p>
        </div>
        <div class="overlay-info">
            <div class="info-chip">FPS: <span id="fps">0</span></div>
            <div class="info-chip">Objects: <span id="obj-count">0</span></div>
            <div class="info-chip">Classes: <span id="class-count">0</span></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">Detected Objects</div>
        <div id="detection-list">
            <div class="empty-state">No detections yet</div>
        </div>
        <div class="footer">YOLO26x · imgsz 1280 · GPU</div>
    </div>
</main>

<script>
    const CLASS_COLORS = {};
    function getColor(cls) {
        if (!CLASS_COLORS[cls]) {
            const hue = (cls.charCodeAt(0) * 47 + cls.charCodeAt(cls.length - 1) * 31) % 360;
            CLASS_COLORS[cls] = `hsl(${hue}, 70%, 55%)`;
        }
        return CLASS_COLORS[cls];
    }

    const feed = document.getElementById('feed');
    const placeholder = document.getElementById('placeholder');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const detList = document.getElementById('detection-list');
    const fpsEl = document.getElementById('fps');
    const objCountEl = document.getElementById('obj-count');
    const classCountEl = document.getElementById('class-count');

    let ws, frameCount = 0, lastFpsTime = Date.now();

    function connect() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws/detect-all`);

        ws.onopen = () => {
            statusDot.className = 'status-dot live';
            statusText.textContent = 'Live';
        };

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);

            if (msg.type === 'frame') {
                feed.src = 'data:image/jpeg;base64,' + msg.data;
                feed.style.display = 'block';
                placeholder.style.display = 'none';

                frameCount++;
                const now = Date.now();
                if (now - lastFpsTime >= 1000) {
                    fpsEl.textContent = frameCount;
                    frameCount = 0;
                    lastFpsTime = now;
                }
            }

            if (msg.detections !== undefined) {
                updateDetections(msg.detections);
            }
        };

        ws.onclose = () => {
            statusDot.className = 'status-dot';
            statusText.textContent = 'Reconnecting...';
            setTimeout(connect, 2000);
        };

        ws.onerror = () => ws.close();
    }

    function updateDetections(detections) {
        // Group by class
        const groups = {};
        detections.forEach(d => {
            if (!groups[d.cls]) groups[d.cls] = { count: 0, maxConf: 0 };
            groups[d.cls].count++;
            groups[d.cls].maxConf = Math.max(groups[d.cls].maxConf, d.conf);
        });

        const sorted = Object.entries(groups).sort((a, b) => b[1].count - a[1].count);
        objCountEl.textContent = detections.length;
        classCountEl.textContent = sorted.length;

        if (sorted.length === 0) {
            detList.innerHTML = '<div class="empty-state">No objects detected</div>';
            return;
        }

        detList.innerHTML = sorted.map(([cls, info]) => {
            const color = getColor(cls);
            const confPct = Math.round(info.maxConf * 100);
            return `
                <div class="det-item">
                    <div class="det-name">
                        <div class="det-color" style="background:${color}"></div>
                        ${cls}
                    </div>
                    <div class="det-right">
                        <span class="det-conf">${confPct}%</span>
                        <span class="det-count">${info.count}</span>
                    </div>
                </div>`;
        }).join('');
    }

    setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 10000);
    connect();
</script>
</body>
</html>
